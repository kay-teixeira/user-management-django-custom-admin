
services:
  db:
    image: postgres:15
    container_name: apoio_db
    environment:
      POSTGRES_DB: danielledb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: apoio_web
    working_dir: /app/danielle  # <--- O pulo do gato está aqui!
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data: